<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dulce Fresita · Menú</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yellowtail&family=Baloo+2:wght@600;700;800&family=Nunito+Sans:ital,wght@0,400;0,600;0,700;0,800;1,600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FDECEF;
    --card:#FFFFFF;
    --rose:#D9808C;
    --rose-line:#EFC7CD;
    --maroon:#8F2233;
    --maroon-deep:#6E1926;
    --red:#B93434;
    --plum-soft:#9c8087;
    --gold:#C98A2E;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    font-family:'Nunito Sans', sans-serif;
    color:#3B2233;
    -webkit-font-smoothing:antialiased;
    padding-bottom:100px;
    position:relative;
  }
  .script{ font-family:'Yellowtail', cursive; }

  /* ---------- background doodles ---------- */
  .doodle{
    position:absolute; z-index:0; pointer-events:none;
    stroke:var(--rose); opacity:0.16;
  }

  /* ---------- header ---------- */
  header.top{
    background:var(--bg);
    padding:22px 20px 10px;
    text-align:center;
    position:relative;
    overflow:hidden;
  }
  header.top img.logo{
    max-width:280px; width:70%; height:auto; position:relative; z-index:1;
    filter:drop-shadow(0 3px 6px rgba(143,34,51,0.15));
  }
  .tagline{
    margin-top:2px; font-size:24px; color:var(--maroon); position:relative; z-index:1;
  }

  /* nav pills */
  nav.cats{
    display:flex; gap:8px; overflow-x:auto; padding:12px 16px;
    background:var(--bg);
    position:sticky; top:0; z-index:20;
    box-shadow:0 2px 10px rgba(143,34,51,0.08);
    scrollbar-width:none;
  }
  nav.cats::-webkit-scrollbar{display:none;}
  .cat-pill{
    flex:0 0 auto;
    padding:7px 15px;
    border-radius:100px;
    background:var(--card);
    border:1.5px solid var(--rose-line);
    color:var(--maroon);
    font-weight:800;
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
    transition:all .15s ease;
  }
  .cat-pill.active{
    background:var(--maroon);
    border-color:var(--maroon);
    color:#fff;
  }
  .cat-pill.info-pill{
    background:var(--rose);
    border-color:var(--rose);
    color:#fff;
  }

  main{ padding:6px 16px 20px; max-width:640px; margin:0 auto; position:relative; z-index:1; }

  section.cat-section{ margin-top:34px; scroll-margin-top:66px; }
  .cat-title{
    font-family:'Yellowtail', cursive;
    font-size:34px; font-weight:400; color:var(--rose);
    display:flex; align-items:center; gap:6px; margin-bottom:10px; line-height:1;
  }
  .cat-title .spark{ font-size:16px; color:var(--red); }

  .item-card{
    background:var(--card);
    border:1px solid var(--rose-line);
    border-radius:10px;
    padding:12px 15px;
    margin-bottom:10px;
  }
  .item-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .item-name{ font-weight:800; font-size:14.5px; color:var(--maroon); text-transform:uppercase; letter-spacing:0.2px; }
  .item-desc{ font-size:12.5px; color:var(--plum-soft); margin-top:3px; line-height:1.4; font-style:italic; }

  .sizes{ display:flex; flex-wrap:wrap; gap:8px; margin-top:11px; }
  .size-btn{
    border:1.5px solid var(--rose-line);
    background:#FEF7F8;
    color:var(--maroon);
    border-radius:8px;
    padding:6px 10px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    display:flex; flex-direction:column; align-items:center;
    line-height:1.3;
    transition:transform .1s ease;
  }
  .size-btn:active{ transform:scale(0.95); }
  .size-btn .lbl{ font-size:10.5px; font-weight:700; opacity:0.7; }
  .size-btn .prc{ font-size:12.5px; color:var(--red); }
  .size-btn.added{ background:var(--maroon); border-color:var(--maroon); color:#fff; }
  .size-btn.added .prc{ color:#fff; }

  .single-row{ display:flex; align-items:center; justify-content:space-between; margin-top:9px; }
  .price{ font-weight:800; color:var(--red); font-size:14.5px; }
  .add-btn{
    background:var(--maroon); color:#fff; border:none; border-radius:8px;
    padding:7px 13px; font-weight:700; font-size:12.5px; cursor:pointer;
  }
  .add-btn.added{ background:var(--gold); }

  .note-price{ font-size:11.5px; color:var(--plum-soft); font-style:italic; }

  /* toppings boxed section, echoing "Toppings / Adicionales" box in the real menu */
  .toppings-box{
    border:1.5px solid var(--rose-line);
    border-radius:14px;
    padding:18px 16px 16px;
    position:relative;
    background:var(--card);
  }
  .toppings-header{
    position:absolute; top:-14px; left:16px;
    background:var(--rose); color:#fff;
    font-weight:800; font-size:12px; letter-spacing:0.5px;
    padding:5px 14px; border-radius:100px;
    text-transform:uppercase;
  }
  .chip-list{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
  .chip{
    background:#FEF3F5; border:1px solid var(--rose-line);
    border-radius:100px; padding:5px 11px; font-size:12px; color:var(--maroon); font-weight:700;
  }
  .chip span{ color:var(--red); font-weight:800; margin-left:4px; }

  /* nequi section */
  .nequi-card{
    border:1.5px dashed var(--gold);
    border-radius:16px; padding:18px; text-align:center;
    background:var(--card);
  }
  .nequi-card .qr-cap{ font-weight:800; color:var(--maroon); font-size:14px; letter-spacing:1px; }
  .nequi-card img.qr{ width:130px; height:130px; margin:10px auto; display:block; border-radius:6px; }
  .nequi-card .qr-name{ font-size:12px; color:var(--rose); font-weight:700; margin-top:2px; }
  .nequi-number{ font-size:19px; font-weight:800; color:var(--gold); letter-spacing:1px; margin-top:8px; }
  .copy-btn{
    margin-top:8px; background:none; border:1.5px solid var(--gold); color:#a8752a;
    border-radius:100px; padding:6px 14px; font-size:12px; font-weight:700; cursor:pointer;
  }
  .nequi-note{ font-size:11.5px; color:var(--plum-soft); margin-top:10px; }

  /* ---------- info section: ubicación, teléfono, horarios, redes ---------- */
  section.info-section{ margin-top:38px; scroll-margin-top:66px; }
  .info-card{
    background:var(--card);
    border:1px solid var(--rose-line);
    border-radius:14px;
    padding:16px 16px 18px;
    margin-bottom:14px;
    position:relative;
  }
  .info-header{
    font-weight:800; font-size:13px; letter-spacing:0.5px;
    color:var(--maroon); text-transform:uppercase;
    display:flex; align-items:center; gap:6px; margin-bottom:10px;
  }
  .map-frame{
    width:100%; height:170px; border:0; border-radius:10px;
    display:block; margin-bottom:10px; filter:grayscale(0.1);
  }
  .info-address{ font-size:13px; color:var(--plum-soft); margin-bottom:12px; line-height:1.4; }
  .directions-btn{
    display:flex; align-items:center; justify-content:center; gap:6px;
    background:var(--maroon); color:#fff; text-decoration:none;
    border-radius:10px; padding:11px; font-weight:800; font-size:13.5px;
  }
  .info-sub{ font-size:11.5px; color:var(--plum-soft); margin-top:4px; }
  .hours-list{ list-style:none; margin:0; padding:0; }
  .hours-list li{
    display:flex; justify-content:space-between; gap:8px;
    font-size:12.5px; color:#3B2233; padding:4px 0;
    border-bottom:1px dashed var(--rose-line);
  }
  .hours-list li:last-child{ border-bottom:none; }
  .hours-list li span:first-child{ font-weight:700; color:var(--maroon); }
  .social-row{ display:flex; gap:10px; flex-wrap:wrap; }
  .social-btn{
    flex:1 1 auto; min-width:90px; text-align:center;
    display:flex; align-items:center; justify-content:center; gap:6px;
    padding:11px 10px; border-radius:10px; font-weight:800; font-size:12.5px;
    text-decoration:none; color:#fff;
  }
  .social-btn.instagram{ background:linear-gradient(135deg,#F58529,#DD2A7B,#8134AF); }
  .social-btn.facebook{ background:#1877F2; }
  .social-btn.tiktok{ background:#111; }

  footer{ text-align:center; padding:34px 20px 10px; position:relative; z-index:1; }
  footer .thanks{ font-family:'Yellowtail', cursive; font-size:30px; color:var(--maroon); }
  footer .sub{ font-size:12px; color:var(--plum-soft); margin-top:2px; }
  footer img.flogo{ width:120px; margin-top:14px; opacity:0.9; }

  /* floating cart */
  .cart-bar{
    position:fixed; left:0; right:0; bottom:0; z-index:40;
    background:var(--maroon-deep);
    color:#fff;
    box-shadow:0 -6px 20px rgba(0,0,0,0.18);
    transition:transform .2s ease;
  }
  .cart-bar.hidden{ transform:translateY(100%); }
  .cart-summary{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 18px; cursor:pointer; max-width:640px; margin:0 auto;
  }
  .cart-summary .left{ display:flex; align-items:center; gap:10px; }
  .cart-count{
    background:#fff; color:var(--maroon-deep); font-weight:800; font-size:12px;
    width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  }
  .cart-total{ font-weight:800; font-size:15px; }
  .chev{ font-size:12px; opacity:0.85; transition:transform .2s ease; }
  .chev.open{ transform:rotate(180deg); }

  .cart-drawer{
    max-height:0; overflow:hidden; transition:max-height .25s ease;
    background:#fff; color:#3B2233;
  }
  .cart-drawer.open{ max-height:60vh; overflow-y:auto; }
  .cart-inner{ max-width:640px; margin:0 auto; padding:6px 18px 16px; }
  .ticket-title{
    text-align:center; font-size:11px; letter-spacing:2px; color:var(--plum-soft);
    font-weight:800; margin:10px 0 6px; text-transform:uppercase;
  }
  .cart-row{
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 0; border-bottom:1px dashed var(--rose-line); font-size:13.5px;
  }
  .cart-row .qty-ctrl{ display:flex; align-items:center; gap:8px; }
  .qty-ctrl button{
    width:22px; height:22px; border-radius:6px; border:1px solid var(--rose-line);
    background:#FEF3F5; color:var(--maroon); font-weight:800; cursor:pointer; font-size:13px;
  }
  .notes-field{ margin-top:14px; }
  .notes-label{ font-size:12px; font-weight:800; color:var(--maroon); display:block; margin-bottom:5px; }
  .notes-input{
    width:100%; border:1.5px solid var(--rose-line); border-radius:10px;
    padding:9px 11px; font-family:'Nunito Sans', sans-serif; font-size:13px;
    color:#3B2233; resize:vertical; box-sizing:border-box;
  }
  .notes-input:focus{ outline:none; border-color:var(--rose); }
  .send-btn{
    width:100%; margin-top:14px; padding:13px; border:none; border-radius:12px;
    background:#25D366; color:#fff; font-weight:800; font-size:14.5px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .empty-cart{ text-align:center; padding:24px 0; color:var(--plum-soft); font-size:13px; }
</style>
</head>

function renderNav(){
  const nav = document.getElementById("catNav");
  nav.innerHTML = `<div class="cat-pill info-pill" data-target="infoSection">📍 Info</div>`
    + MENU.map((c,i)=>`<div class="cat-pill${i===0?' active':''}" data-target="${c.id}">${c.title}</div>`).join("");
  nav.querySelectorAll(".cat-pill").forEach(p=>{
    p.addEventListener("click", ()=>{
      document.getElementById(p.dataset.target).scrollIntoView({behavior:"smooth", block:"start"});
    });
  });
}

function renderInfo(){
  document.getElementById("mapFrame").src =
    `https://www.google.com/maps?q=${encodeURIComponent(ADDRESS_TEXT)}&output=embed`;
  document.getElementById("directionsBtn").href =
    `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(ADDRESS_TEXT)}`;

  document.getElementById("hoursList").innerHTML = HOURS.map(([days,range])=>`
    <li><span>${days}</span><span>${range}</span></li>
  `).join("");

  document.getElementById("socialRow").innerHTML = SOCIALS.map(s=>`
    <a class="social-btn ${s.cls}" href="${s.url}" target="_blank" rel="noopener">${s.label}</a>
  `).join("");
}

function renderItem(it){
  const desc = it.desc ? `<div class="item-desc">${it.desc}</div>` : "";
  if (it.sizes){
    return `
    <div class="item-card">
      <div class="item-top"><div class="item-name">${it.name}</div></div>
      ${desc}
      <div class="sizes">
        ${it.sizes.map(([label,price])=>{
          const key = itemKey(it.name,label);
          return `<div class="size-btn" data-key="${key}" data-name="${it.name}" data-size="${label}" data-price="${price}">
            <span class="lbl">${label}</span><span class="prc">${money(price)}</span>
          </div>`;
        }).join("")}
      </div>
    </div>`;
  }
  if (it.note){
    return `
    <div class="item-card">
      <div class="item-top"><div class="item-name">${it.name}</div></div>
      ${desc}
      <div class="note-price">${it.note}</div>
    </div>`;
  }
  const key = itemKey(it.name, "");
  return `
    <div class="item-card">
      <div class="item-top"><div class="item-name">${it.name}</div></div>
      ${desc}
      <div class="single-row">
        <div class="price">${money(it.price)}</div>
        <button class="add-btn" data-key="${key}" data-name="${it.name}" data-size="" data-price="${it.price}">Agregar</button>
      </div>
    </div>`;
}

function attachHandlers(){
  document.getElementById("menuMain").addEventListener("click", (e)=>{
    const el = e.target.closest(".size-btn, .add-btn");
    if(!el) return;
    const key = el.dataset.key, name = el.dataset.name, size = el.dataset.size, price = Number(el.dataset.price);
    addToCart(key, name, size, price);
    el.classList.add("added");
    if (el.classList.contains("add-btn")) el.textContent = "Agregado ✓";
    setTimeout(()=>{
      el.classList.remove("added");
      if (el.classList.contains("add-btn")) el.textContent = "Agregar";
    }, 700);
  });
}

function addToCart(key,name,size,price){
  if(!cart[key]) cart[key] = { name, size, price, qty:0 };
  cart[key].qty += 1;
  renderCart();
}
function changeQty(key, delta){
  if(!cart[key]) return;
  cart[key].qty += delta;
  if(cart[key].qty <= 0) delete cart[key];
  renderCart();
}

function renderCart(){
  const entries = Object.entries(cart);
  const count = entries.reduce((s,[,v])=>s+v.qty,0);
  const total = entries.reduce((s,[,v])=>s+v.qty*v.price,0);

  document.getElementById("cartCount").textContent = count;
  document.getElementById("cartTotalTop").textContent = money(total);
  document.getElementById("cartTotal").textContent = money(total);

  const bar = document.getElementById("cartBar");
  bar.classList.toggle("hidden", count === 0);

  const itemsEl = document.getElementById("cartItems");
  if(entries.length === 0){
    itemsEl.innerHTML = `<div class="empty-cart">Tu pedido está vacío</div>`;
  } else {
    itemsEl.innerHTML = entries.map(([key,v])=>`
      <div class="cart-row">
        <div>${v.name}${v.size ? " · "+v.size : ""}<br><span style="color:var(--plum-soft); font-size:12px;">${money(v.price)} c/u</span></div>
        <div class="qty-ctrl">
          <button data-key="${key}" data-d="-1">−</button>
          <span>${v.qty}</span>
          <button data-key="${key}" data-d="1">+</button>
        </div>
      </div>
    `).join("");
    itemsEl.querySelectorAll("button").forEach(b=>{
      b.addEventListener("click", ()=> changeQty(b.dataset.key, Number(b.dataset.d)));
    });
  }
}

document.getElementById("cartSummary").addEventListener("click", ()=>{
  const drawer = document.getElementById("cartDrawer");
  const chev = document.getElementById("chev");
  drawer.classList.toggle("open");
  chev.classList.toggle("open");
});

document.getElementById("sendBtn").addEventListener("click", ()=>{
  const entries = Object.entries(cart);
  if(entries.length === 0) return;
  let msg = "¡Hola Dulce Fresita! 🍓 Quiero pedir:\n\n";
  entries.forEach(([,v])=>{
    msg += `🍓 ${v.qty}x ${v.name}${v.size ? " ("+v.size+")" : ""} — ${money(v.qty*v.price)}\n`;
  });
  const total = entries.reduce((s,[,v])=>s+v.qty*v.price,0);
  msg += `\nTotal: ${money(total)}`;
  const notes = document.getElementById("orderNotes").value.trim();
  if (notes) {
    msg += `\n\nObservaciones: ${notes}`;
  }
  const location = document.getElementById("orderLocation").value.trim();
  if (location) {
    msg += `\n📍 Ubicación: ${location}`;
  }
  const url = `https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`;
  window.open(url, "_blank");
});

renderNav();
renderMenu();
renderInfo();
attachHandlers();
renderCart();
</script>

</body>
</html>
